<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多语言任务进度</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dce3ee;
      --line-soft: #edf1f6;
      --text: #152033;
      --muted: #68758a;
      --blue: #3766f5;
      --green: #11a56a;
      --orange: #f09a2a;
      --red: #ee4d5a;
      --purple: #805ad5;
      --cyan: #0d9488;
      --shadow: 0 14px 36px rgba(27, 39, 65, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      padding: 22px 32px 34px;
      max-width: 1560px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #26344d;
      padding: 0 12px;
      cursor: pointer;
      transition: .15s ease;
      white-space: nowrap;
    }

    .actions .btn {
      width: 104px;
      text-align: center;
    }

    .btn:hover {
      border-color: #b9c5d8;
      box-shadow: 0 4px 14px rgba(30, 45, 70, .08);
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: white;
      font-weight: 650;
    }

    .btn.danger {
      color: var(--red);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      background: #eef2f8;
      padding: 4px;
      border-radius: 8px;
    }

    .tab {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #536177;
      height: 32px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 650;
    }

    .tab.active {
      background: #fff;
      color: var(--blue);
      box-shadow: 0 3px 10px rgba(31, 47, 73, .08);
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .field, .select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: #26344d;
      padding: 0 10px;
      min-width: 136px;
    }

    .field {
      width: 180px;
    }

    .board {
      display: grid;
      gap: 14px;
    }

    .workspace {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 260px;
      gap: 14px;
      align-items: start;
    }

    .side-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .side-section {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    .side-section:last-child {
      border-bottom: 0;
    }

    .side-title {
      margin: 0 0 10px;
      color: #42516b;
      font-size: 12px;
      font-weight: 800;
    }

    .side-list {
      display: grid;
      gap: 8px;
    }

    .side-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      color: #26344d;
      font-size: 13px;
    }

    .side-item strong {
      color: var(--text);
    }

    .side-muted {
      color: var(--muted);
      font-size: 12px;
    }

    .side-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 22px;
      border-radius: 999px;
      background: #eef3fb;
      color: #536177;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .side-chip.warn {
      background: #fff1df;
      color: #a35a00;
    }

    .side-chip.hot {
      background: #ffe8ec;
      color: #d0182d;
    }

    .quick-actions {
      display: grid;
      gap: 8px;
    }

    .quick-actions .btn {
      width: 100%;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric strong {
      font-size: 22px;
      letter-spacing: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    table {
      width: 100%;
      min-width: 1240px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      border-bottom: 1px solid var(--line-soft);
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    th {
      color: #4b5870;
      background: #fbfcfe;
      font-size: 12px;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    tbody td {
      background: #fff;
    }

    th:nth-child(1),
    td:nth-child(1),
    th:nth-child(2),
    td:nth-child(2) {
      position: sticky;
      background: inherit;
    }

    th:nth-child(1),
    td:nth-child(1) {
      left: 0;
      z-index: 4;
    }

    th:nth-child(2),
    td:nth-child(2) {
      left: 38px;
      z-index: 4;
      box-shadow: 1px 0 0 var(--line-soft);
    }

    th:nth-child(1),
    th:nth-child(2) {
      background: #fbfcfe;
      z-index: 6;
    }

    tr.task-group td {
      background: #fffaf1;
      border-top: 1px solid #f2dfbd;
      font-weight: 700;
    }

    tr:hover td {
      background: #f9fbff;
    }

    tr.task-group:hover td {
      background: #fff7e8;
    }

    .drag {
      color: #9aa6b6;
      text-align: center;
      font-weight: 700;
    }

    .task-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .star {
      color: #c5ceda;
      font-size: 18px;
    }

    .star.hot {
      color: var(--orange);
    }

    .lang {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 24px;
      border-radius: 999px;
      padding: 0 10px;
      font-weight: 700;
      font-size: 12px;
    }

    .lang.es { background: #e9efff; color: #3057d7; }
    .lang.fr { background: #fff1dd; color: #a35b00; }
    .lang.en { background: #dff6ff; color: #047596; }
    .lang.de { background: #e7f8eb; color: #147b3a; }
    .lang.pt { background: #dff7ef; color: #0c7660; }
    .lang.ja { background: #ffe8e8; color: #b63842; }
    .lang.ko { background: #eee8ff; color: #6a43c5; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 24px;
      border-radius: 6px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .priority-p0 { background: #ffe8ec; color: #d0182d; }
    .priority-p1 { background: #fff1df; color: #a35a00; }
    .priority-p2 { background: #e6f8ff; color: #087596; }

    .status-select {
      width: 92px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 8px;
      background: #f7faff;
    }

    .status-select[data-status="进行中"] { background: #eaf3ff; color: #115cae; border-color: #a7cdf8; }
    .status-select[data-status="待审核"] { background: #fff3d8; color: #925500; border-color: #ffd384; }
    .status-select[data-status="已完成"] { background: #dff8eb; color: #087345; border-color: #8de0b8; }
    .status-select[data-status="暂停"] { background: #f1eefb; color: #6b46c1; border-color: #c9b9f2; }

    .priority-control {
      display: grid;
      grid-template-columns: repeat(3, 28px);
      gap: 3px;
      align-items: center;
    }

    .priority-btn {
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #68758a;
      padding: 0;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .priority-btn[data-priority="P0"].active {
      background: #ffe8ec;
      color: #d0182d;
      border-color: #ff9dab;
    }

    .priority-btn[data-priority="P1"].active {
      background: #fff1df;
      color: #a35a00;
      border-color: #ffc56f;
    }

    .priority-btn[data-priority="P2"].active {
      background: #e6f8ff;
      color: #087596;
      border-color: #8ed4ea;
    }

    .progress-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .progress-number {
      width: 62px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      text-align: center;
      padding: 0 6px;
      background: #fff;
      color: var(--blue);
      font-weight: 800;
    }

    .progress-number::-webkit-outer-spin-button,
    .progress-number::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .note {
      width: 100%;
      height: 30px;
      border: 1px dashed var(--line);
      border-radius: 6px;
      padding: 0 8px;
      background: #fff;
      color: #26344d;
    }

    .note-input {
      min-width: 180px;
    }

    .owner {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .owner span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .owner-input {
      width: calc(100% - 32px);
      height: 30px;
      min-width: 88px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 8px;
      background: #fff;
      color: var(--text);
    }

    .avatar.a { background: #8b5cf6; }
    .avatar.b { background: #0ea5e9; }
    .avatar.c { background: #f97316; }
    .avatar.d { background: #22c55e; }
    .avatar.e { background: #14b8a6; }
    .avatar.f { background: #ef4444; }
    .avatar.g { background: #6366f1; }

    .empty {
      padding: 34px;
      text-align: center;
      color: var(--muted);
    }

    .person-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(18, 28, 45, .35);
      padding: 24px;
    }

    .modal {
      width: min(860px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .25);
    }

    .modal-head,
    .modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line-soft);
    }

    .modal-foot {
      border-top: 1px solid var(--line-soft);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .form-field {
      display: grid;
      gap: 6px;
    }

    .form-field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 9px;
      background: #fff;
      color: var(--text);
    }

    .form-field textarea {
      min-height: 80px;
      resize: vertical;
    }

    .span-3 {
      grid-column: span 3;
    }

    .person-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .person-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line-soft);
      background: #fbfcfe;
    }

    .person-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      font-weight: 800;
    }

    .person-meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .person-body {
      padding: 12px 14px 14px;
      display: grid;
      gap: 12px;
    }

    .mini-task {
      display: grid;
      gap: 7px;
      padding-bottom: 11px;
      border-bottom: 1px solid var(--line-soft);
    }

    .mini-task:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .mini-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #e8edf4;
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      width: 0;
      background: var(--blue);
      border-radius: inherit;
    }

    .save-state {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media print {
      body {
        min-width: 0;
        background: #fff;
      }

      .app {
        padding: 12px;
      }

      .actions,
      .toolbar {
        display: none !important;
      }

      .panel,
      .metric,
      .person-card {
        box-shadow: none;
      }

      th {
        position: static;
      }

      input,
      select {
        border: 0 !important;
        background: transparent !important;
      }

      input[type="range"] {
        display: none;
      }
    }

    @media (max-width: 1280px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .side-panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .side-section {
        border-bottom: 0;
        border-right: 1px solid var(--line-soft);
      }

      .side-section:last-child {
        border-right: 0;
      }
    }

    @media (max-width: 860px) {
      .app {
        padding: 16px;
      }

      .topbar,
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .filters,
      .actions {
        justify-content: flex-start;
      }

      .summary-grid,
      .side-panel {
        grid-template-columns: 1fr;
      }

      .side-section {
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="title">
        <h1>多语言任务进度</h1>
        <p id="saveState">已开启本地记忆</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="addTaskBtn">添加任务</button>
        <button class="btn" id="syncSystemBtn">同步系统进度</button>
        <label class="btn" for="appendFile">追加任务</label>
        <input class="hidden" id="appendFile" type="file" accept=".json,.csv,text/csv,application/json">
        <button class="btn" id="scheduleBtn">自动排期</button>
        <button class="btn" id="pdfBtn">导出 PDF</button>
        <button class="btn" id="excelBtn">导出 Excel</button>
        <button class="btn" id="exportBtn">导出数据</button>
        <label class="btn" for="importFile">恢复数据</label>
        <input class="hidden" id="importFile" type="file" accept="application/json">
        <button class="btn danger" id="resetBtn">恢复初始</button>
      </div>
    </section>

    <section class="toolbar">
      <div class="tabs">
        <button class="tab active" data-view="task">任务总览</button>
        <button class="tab" data-view="person">个人进度</button>
      </div>
      <div class="filters">
        <input class="field" id="searchInput" placeholder="搜索任务、语种、负责人">
        <select class="select" id="taskFilter">
          <option value="全部任务">全部任务</option>
          <option value="BALL 修改">BALL 修改</option>
          <option value="GOT 术语库修改">GOT 术语库修改</option>
          <option value="GOT 修改">GOT 修改</option>
        </select>
        <select class="select" id="statusFilter">
          <option value="全部状态">全部状态</option>
          <option value="未开始">未开始</option>
          <option value="进行中">进行中</option>
          <option value="待审核">待审核</option>
          <option value="已完成">已完成</option>
          <option value="暂停">暂停</option>
        </select>
      </div>
    </section>

    <section class="summary-grid" id="summaryGrid"></section>

    <section class="workspace" id="taskView">
      <aside class="side-panel" id="leftRail"></aside>
      <section class="board">
        <div class="panel">
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th style="width:38px"></th>
                  <th style="width:180px">任务名称</th>
                  <th style="width:92px">语种</th>
                  <th style="width:170px">负责人</th>
                  <th style="width:100px">任务类型</th>
                  <th style="width:108px">任务状态</th>
                  <th style="width:92px">优先级</th>
                  <th style="width:120px">开始日期</th>
                  <th style="width:120px">截止日期</th>
                  <th style="width:92px">进度</th>
                  <th style="width:230px">备注</th>
                </tr>
              </thead>
              <tbody id="taskRows"></tbody>
            </table>
          </div>
          <div class="empty hidden" id="emptyTask">没有符合条件的任务</div>
        </div>
      </section>
      <aside class="side-panel" id="rightRail"></aside>
    </section>

    <section class="person-grid hidden" id="personView"></section>

    <section class="modal-backdrop hidden" id="taskModal">
      <form class="modal" id="taskForm">
        <div class="modal-head">
          <h2>添加任务</h2>
          <button class="btn" type="button" id="closeModalBtn">关闭</button>
        </div>
        <div class="form-grid">
          <div class="form-field">
            <label>任务分组</label>
            <select name="group">
              <option>BALL 修改</option>
              <option selected>GOT 术语库修改</option>
              <option>GOT 修改</option>
            </select>
          </div>
          <div class="form-field">
            <label>任务名称</label>
            <input name="name" required placeholder="例如：意大利语 GOT 术语库">
          </div>
          <div class="form-field">
            <label>语种</label>
            <input name="lang" required placeholder="例如：意大利语">
          </div>
          <div class="form-field">
            <label>负责人</label>
            <input name="owner" required list="ownerList" placeholder="负责人姓名">
          </div>
          <div class="form-field">
            <label>任务类型</label>
            <select name="type">
              <option>修改</option>
              <option>术语库</option>
              <option>翻译</option>
            </select>
          </div>
          <div class="form-field">
            <label>状态</label>
            <select name="status">
              <option selected>未开始</option>
              <option>进行中</option>
              <option>待审核</option>
              <option>已完成</option>
              <option>暂停</option>
            </select>
          </div>
          <div class="form-field">
            <label>优先级</label>
            <select name="priority">

    async function loadRemoteRows() {
      if (location.protocol === "file:") {

      try {

        const remoteRows = await response.json();
        if (!Array.isArray(remoteRows)) throw new Error("数据格式不正确");

        const remoteText = JSON.stringify(remoteRows);

          lastRemoteRows = remoteText;

    async function syncGlossaryProgress({ silent } = { silent: true }) {

        const response = await fetch("https://lqa.qixuanzhen.site/api/translation/glossary/stats", {

          cache: "no-store"
        });
        if (!response.ok) throw new Error("读取系统统计失败");
        const stats = await response.json();
        const total = Number(stats.total || 0);
        const confirmed = stats.confirmed_by_lang || {};
        if (!total || !Object.keys(confirmed).length) throw new Error("系统统计数据为空");

        let changed = 0;
        rows.forEach(row => {
          if (row.group !== "GOT 术语库修改") return;
          const systemCode = systemLangCode(row.langCode, row.lang);
          if (!systemCode || confirmed[systemCode] === undefined) return;
          const done = Number(confirmed[systemCode] || 0);
          row.size = total;
          row.progress = Math.round(done / total * 100);
          row.note = upsertSystemNote(row.note, done, total);
          if (row.progress >= 100) row.status = "已完成";
          else if (row.progress > 0 && row.status === "未开始") row.status = "进行中";
          changed++;

        saveRows();
        render();
        systemSyncEnabled = true;
        els.saveState.textContent = `已同步系统术语库进度：${changed} 项`;

    function normalizeTask(task) {
      const data = normalizeTaskKeys(task);
      const lang = data.lang || "";
      const owner = data.owner || "";
      const name = data.name || [lang, data.group || "新任务"].filter(Boolean).join(" ");
      return {
        id: data.id || `task-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        group: data.group || "GOT 修改",
        name,
        lang,
        langCode: data.langCode || langCodeOf(lang),
        owner,
        avatar: task.avatar || avatarOf(owner),
        type: data.type || "修改",
        status: data.status || "未开始",
        priority: normalizePriority(data.priority || "P1"),
        start: data.start || "",
        due: data.due || "",
        progress: clamp(String(data.progress || "0").replace("%", "")),
        size: Number(data.size || defaultSize(data.group || "")),
        daily: Number(data.daily || defaultDaily(lang, owner, data.group || "")),
        note: data.note || ""
      };
    }

    function normalizeTaskKeys(task) {
      const aliases = {
        id: ["id", "ID", "任务编号", "编号"],
        group: ["group", "任务分组", "分组", "任务大类", "项目", "模块"],
        name: ["name", "任务名称", "任务名", "名称", "标题", "任务"],
        lang: ["lang", "语种", "语言", "目标语言", "language"],
        langCode: ["langCode", "语言代码", "语种代码", "languageCode"],
        owner: ["owner", "负责人", "人员", "执行人", "成员", "ownerName", "assignee"],
        type: ["type", "任务类型", "类型"],
        status: ["status", "任务状态", "状态", "进度状态"],
        priority: ["priority", "优先级", "优先", "P"],
        start: ["start", "开始日期", "开始", "开始时间", "startDate"],
        due: ["due", "截止日期", "截止", "截止时间", "交付", "dueDate", "deadline"],
        progress: ["progress", "当前进度", "进度", "完成度", "百分比"],
        size: ["size", "任务量", "总量", "总条数", "条数"],
        daily: ["daily", "每日能力", "日处理量", "每天条数", "日产能"],
        note: ["note", "备注", "说明", "补充", "comment"]
      };
      const normalized = {};
      Object.entries(aliases).forEach(([key, names]) => {
        for (const name of names) {
          if (task[name] !== undefined && task[name] !== "") {
            normalized[key] = task[name];
            break;
          }
        }
      });
      return normalized;
    }

    function normalizePriority(value) {
      const text = String(value || "").trim().toUpperCase();
      if (text.includes("0") || text.includes("紧急")) return "P0";
      if (text.includes("2") || text.includes("低")) return "P2";
      return "P1";
    }

    function parseTaskImport(text, fileName) {
      const trimmed = text.trim();
      if (!trimmed) return [];
      if (fileName.toLowerCase().endsWith(".json") || trimmed.startsWith("[")) {
        const parsed = JSON.parse(trimmed);
        return Array.isArray(parsed) ? parsed : [parsed];
      }

      const rows = parseCsv(trimmed);
      if (rows.length < 2) return [];
      const headers = rows[0].map(header => header.trim());
      return rows.slice(1).filter(cells => cells.some(Boolean)).map(cells => {
        const item = {};
        headers.forEach((header, index) => item[header] = cells[index] || "");
        return item;
      });
    }

    function parseCsv(text) {
      const result = [];
      let row = [];
      let value = "";
      let quoted = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && quoted && next === '"') {
          value += '"';
          i++;
        } else if (char === '"') {
          quoted = !quoted;
        } else if ((char === "," || char === "\t") && !quoted) {
          row.push(value.trim());
          value = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i++;
          row.push(value.trim());
          result.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }
      row.push(value.trim());
      result.push(row);
      return result;
    }

    function autoSchedule(startText) {
      const baseDate = parseDate(startText) || new Date();
      const ownerDates = new Map();
      const priorityRank = { P0: 0, P1: 1, P2: 2 };
      const candidates = rows
        .filter(row => row.status !== "已完成")
        .sort((a, b) => (priorityRank[a.priority] ?? 9) - (priorityRank[b.priority] ?? 9));

      candidates.forEach(row => {
        const owner = row.owner || "未分配";
        const available = ownerDates.get(owner) || new Date(baseDate);
        const remainingPercent = Math.max(0, 100 - Number(row.progress || 0));
        const totalSize = Number(row.size || 0);
        const daily = Number(row.daily || 0);
        const days = totalSize > 0 && daily > 0
          ? Math.max(1, Math.ceil((totalSize * remainingPercent / 100) / daily))
          : 1;
        const due = addDays(available, days - 1);
        row.start = formatDate(available);
        row.due = formatDate(due);
        ownerDates.set(owner, addDays(due, 1));
      });
    }

    function parseDate(text) {
      const match = String(text).trim().match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
      if (!match) return null;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}/${m}/${d}`;
    }

    function langCodeOf(lang) {
      if (lang.includes("西")) return "es";
      if (lang.includes("法")) return "fr";
      if (lang.includes("英")) return "en";
      if (lang.includes("德")) return "de";
      if (lang.includes("葡")) return "pt";
      if (lang.includes("日")) return "ja";
      if (lang.includes("韩")) return "ko";
      return "en";
    }

    function systemLangCode(code, lang) {
      const byCode = { en: "en", de: "de", fr: "fr", es: "es", pt: "pt", ja: "jp", ko: "kr", jp: "jp", kr: "kr" };
      if (byCode[code]) return byCode[code];
      if (lang.includes("英")) return "en";
      if (lang.includes("德")) return "de";
      if (lang.includes("法")) return "fr";
      if (lang.includes("西")) return "es";
      if (lang.includes("葡")) return "pt";
      if (lang.includes("日")) return "jp";
      if (lang.includes("韩")) return "kr";
      return "";
    }

    function upsertSystemNote(note, done, total) {
      const prefix = `系统确认 ${done}/${total}`;
      const rest = String(note || "").replace(/系统确认\s+\d+\/\d+\s*；?\s*/g, "").trim();
      return rest ? `${prefix}；${rest}` : prefix;
    }

    function avatarOf(owner) {
      const codes = ["a", "b", "c", "d", "e", "f", "g"];
      let sum = 0;
      for (const char of owner || "未") sum += char.charCodeAt(0);
      return codes[sum % codes.length];
    }

    function defaultSize(group) {
      return String(group).includes("术语库") ? 1747 : 0;
    }

    function defaultDaily(lang, owner, group) {
      if (!String(group).includes("术语库")) return 0;
      if (String(owner).includes("屿舟") || String(owner).includes("游城") || String(lang).includes("英")) return 1749;
      if (String(lang).includes("法") || String(lang).includes("葡")) return 400;
      if (String(lang).includes("德") || String(lang).includes("日")) return 438;
      return 400;
    }

    function filteredRows() {
      const q = els.search.value.trim().toLowerCase();
      return rows.filter(row => {
        const matchTask = els.taskFilter.value === "全部任务" || row.group === els.taskFilter.value;
        const matchStatus = els.statusFilter.value === "全部状态" || row.status === els.statusFilter.value;
        const text = [row.name, row.lang, row.owner, row.group, row.note].join(" ").toLowerCase();
        return matchTask && matchStatus && (!q || text.includes(q));
      });
    }

    function render() {
      renderOwnerList();
      renderSummary();
      renderRails();
      if (currentView === "task") renderTaskTable();
      if (currentView === "person") renderPersonCards();
    }

    function renderOwnerList() {
      const owners = [...new Set(rows.map(row => row.owner).filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"));
      els.ownerList.innerHTML = owners.map(owner => `<option value="${escapeAttr(owner)}"></option>`).join("");
    }

    function renderSummary() {
      const total = rows.length;
      const completed = rows.filter(row => row.status === "已完成").length;
      const active = rows.filter(row => row.status === "进行中").length;
      const avg = total ? Math.round(rows.reduce((sum, row) => sum + Number(row.progress || 0), 0) / total) : 0;
      const termAvg = average(rows.filter(row => row.group === "GOT 术语库修改"));
      const editAvg = average(rows.filter(row => row.group === "GOT 修改"));

      const metrics = [
        ["总任务", total + " 项"],
        ["进行中", active + " 项"],
        ["已完成", completed + " 项"],
        ["整体进度", avg + "%"]
      ];

      els.summaryGrid.innerHTML = metrics.map(item => `
        <div class="metric">
          <span>${item[0]}</span>
          <strong>${item[1]}</strong>
        </div>
      `).join("");
    }

    function renderRails() {
      if (!els.leftRail || !els.rightRail) return;
      const list = filteredRows();
      const groups = ["BALL 修改", "GOT 术语库修改", "GOT 修改"];
      const lowProgress = rows
        .filter(row => row.status !== "已完成" && Number(row.progress || 0) < 30)
        .slice(0, 5);
      const owners = [...new Set(list.map(row => row.owner).filter(Boolean))];
      const ownerSummary = owners.map(owner => {
        const ownRows = list.filter(row => row.owner === owner);
        return { owner, count: ownRows.length, avg: average(ownRows) };
      }).sort((a, b) => b.count - a.count || a.avg - b.avg).slice(0, 6);

      els.leftRail.innerHTML = `
        <div class="side-section">
          <p class="side-title">任务分组</p>
          <div class="side-list">
            ${groups.map(group => {
              const groupRows = rows.filter(row => row.group === group);
              return `<div class="side-item"><span>${group}</span><span class="side-chip">${groupRows.length}</span></div>`;
            }).join("")}
          </div>
        </div>
        <div class="side-section">
          <p class="side-title">需要关注</p>
          <div class="side-list">
            ${lowProgress.length ? lowProgress.map(row => `
              <div class="side-item" title="${escapeAttr(row.name)}">
                <span>${escapeHtml(shortText(row.name, 10))}</span>
                <span class="side-chip ${row.priority === "P0" ? "hot" : "warn"}">${row.progress}%</span>
              </div>
            `).join("") : `<div class="side-muted">暂无低进度任务</div>`}
          </div>
        </div>
        <div class="side-section">
          <p class="side-title">同步状态</p>
          <div class="side-muted">${escapeHtml(els.saveState.textContent || "已开启本地记忆")}</div>
        </div>
      `;

      els.rightRail.innerHTML = `
        <div class="side-section">
          <p class="side-title">快捷操作</p>
          <div class="quick-actions">
            <button class="btn primary" data-quick="add">添加任务</button>
            <button class="btn" data-quick="sync">同步系统进度</button>
            <button class="btn" data-quick="schedule">自动排期</button>
          </div>
        </div>
        <div class="side-section">
          <p class="side-title">负责人负载</p>
          <div class="side-list">
            ${ownerSummary.length ? ownerSummary.map(item => `
              <div class="side-item">
                <span><strong>${escapeHtml(shortText(item.owner, 8))}</strong><span class="side-muted"> · ${item.avg}%</span></span>
                <span class="side-chip">${item.count}</span>
              </div>
            `).join("") : `<div class="side-muted">暂无负责人</div>`}
          </div>
        </div>
        <div class="side-section">
          <p class="side-title">辅助信息</p>
          <div class="side-list">
            <div class="side-item"><span>术语库平均</span><span class="side-chip">${average(rows.filter(row => row.group === "GOT 术语库修改"))}%</span></div>
            <div class="side-item"><span>GOT 修改平均</span><span class="side-chip">${average(rows.filter(row => row.group === "GOT 修改"))}%</span></div>
            <div class="side-item"><span>BALL 优先</span><span class="side-chip">${rows.filter(row => row.group === "BALL 修改").length}</span></div>
          </div>
        </div>
      `;

      els.rightRail.querySelector('[data-quick="add"]')?.addEventListener("click", () => els.addTaskBtn.click());
      els.rightRail.querySelector('[data-quick="sync"]')?.addEventListener("click", () => els.syncSystemBtn.click());
      els.rightRail.querySelector('[data-quick="schedule"]')?.addEventListener("click", () => els.scheduleBtn.click());
    }

    function average(list) {
      if (!list.length) return 0;
      return Math.round(list.reduce((sum, row) => sum + Number(row.progress || 0), 0) / list.length);
    }

    function renderTaskTable() {
      const list = filteredRows();
      const groups = ["BALL 修改", "GOT 术语库修改", "GOT 修改"];
      const html = groups.map(group => {
        const groupRows = list.filter(row => row.group === group);
        if (!groupRows.length) return "";
        return `
          <tr class="task-group">
            <td class="drag">▸</td>
            <td colspan="10">
              <span class="task-name"><span class="star hot">★</span>${group}</span>
            </td>
          </tr>
          ${groupRows.map(rowTemplate).join("")}
        `;
      }).join("");

      els.taskRows.innerHTML = html;
      els.emptyTask.classList.toggle("hidden", list.length > 0);
      bindRowEvents();
    }

    function rowTemplate(row) {
      return `
        <tr data-id="${row.id}">
          <td class="drag">⋮⋮</td>
          <td title="${escapeHtml(row.name)}">${escapeHtml(row.name)}</td>
          <td><span class="lang ${row.langCode}">${escapeHtml(row.lang)}</span></td>
          <td>
            <span class="owner">
              <span class="avatar ${row.avatar}">${escapeHtml((row.owner || "未").slice(0, 1))}</span>
              <input data-field="owner" class="owner-input" list="ownerList" value="${escapeAttr(row.owner || "")}" placeholder="负责人">
            </span>
          </td>
          <td><span class="pill ${row.type === "术语库" ? "priority-p2" : "priority-p1"}">${escapeHtml(row.type)}</span></td>
          <td>
            <select class="status-select" data-field="status" data-status="${row.status}">
              ${["未开始", "进行中", "待审核", "已完成", "暂停"].map(status => `<option ${status === row.status ? "selected" : ""}>${status}</option>`).join("")}
            </select>
          </td>
          <td>
            <div class="priority-control" data-field="priority">
              ${["P0", "P1", "P2"].map(priority => `<button type="button" class="priority-btn ${priority === row.priority ? "active" : ""}" data-priority="${priority}">${priority}</button>`).join("")}
            </div>
          </td>
          <td><input data-field="start" class="note" value="${escapeAttr(row.start || "")}" placeholder="开始日期"></td>
          <td><input data-field="due" class="note" value="${escapeAttr(row.due || "")}" placeholder="截止日期"></td>
          <td>
            <div class="progress-cell">
              <input data-field="progressNumber" class="progress-number" type="number" min="0" max="100" value="${row.progress}">
            </div>
          </td>
          <td><input data-field="note" class="note note-input" value="${escapeAttr(row.note || "")}"></td>
        </tr>
      `;
    }

    function bindRowEvents() {
      els.taskRows.querySelectorAll("tr[data-id]").forEach(tr => {
        const row = rows.find(item => item.id === tr.dataset.id);
        tr.querySelectorAll("[data-field]").forEach(input => {
          if (input.dataset.field === "priority") return;
          input.addEventListener("input", () => updateRow(row, input, tr));
          input.addEventListener("change", () => updateRow(row, input, tr));
        });
        tr.querySelectorAll(".priority-btn").forEach(button => {
          button.addEventListener("click", () => {
            row.priority = button.dataset.priority;
            tr.querySelectorAll(".priority-btn").forEach(item => item.classList.toggle("active", item === button));
            saveRows();
            renderSummary();
            renderRails();
            if (currentView === "person") renderPersonCards();
          });
        });
      });
    }

    function updateRow(row, input, tr) {
      const field = input.dataset.field;
      if (field === "progress") {
        row.progress = clamp(input.value);
        const numberInput = tr.querySelector('[data-field="progressNumber"]');
        if (numberInput) numberInput.value = row.progress;
      }
      if (field === "progressNumber") {
        row.progress = clamp(input.value);
        const rangeInput = tr.querySelector('[data-field="progress"]');
        if (rangeInput) rangeInput.value = row.progress;
      }
      if (field === "status") {
        row.status = input.value;
        input.dataset.status = input.value;
        if (row.status === "已完成" && Number(row.progress) < 100) row.progress = 100;
        if (row.status !== "已完成" && Number(row.progress) === 100) row.progress = 99;
        const rangeInput = tr.querySelector('[data-field="progress"]');
        const numberInput = tr.querySelector('[data-field="progressNumber"]');
        if (rangeInput) rangeInput.value = row.progress;
        if (numberInput) numberInput.value = row.progress;
      }
      if (field === "owner") {
        row.owner = input.value.trim();
        row.avatar = avatarOf(row.owner);
        const avatar = tr.querySelector(".avatar");
        if (avatar) {
          avatar.className = `avatar ${row.avatar}`;
          avatar.textContent = (row.owner || "未").slice(0, 1);
        }
        renderOwnerList();
      }
      if (field === "start") {
        row.start = input.value;
      }
      if (field === "due") {
        row.due = input.value;
      }
      if (field === "note") {
        row.note = input.value;
      }
      saveRows();
      renderSummary();
      if (currentView === "person") renderPersonCards();
    }

    function renderPersonCards() {
      const list = filteredRows();
      const owners = [...new Set(rows.map(row => row.owner))];
      els.personView.innerHTML = owners.map(owner => {
        const personRows = list.filter(row => row.owner === owner);
        if (!personRows.length) return "";
        const first = personRows[0];
        const avg = average(personRows);
        return `
          <article class="person-card">
            <header class="person-head">
              <div class="person-title">
                <span class="avatar ${first.avatar}">${escapeHtml(owner.slice(0, 1))}</span>
                <span>${escapeHtml(owner)}</span>
              </div>
              <span class="person-meta">${personRows.length} 项 · ${avg}%</span>
            </header>
            <div class="person-body">
              ${personRows.map(personTaskTemplate).join("")}
            </div>
          </article>
        `;
      }).join("") || `<div class="empty">没有符合条件的个人任务</div>`;
    }

    function personTaskTemplate(row) {
      return `
        <div class="mini-task">
          <div class="mini-row">
            <strong>${escapeHtml(row.name)}</strong>
            <span class="pill priority-${row.priority.toLowerCase()}">${row.priority}</span>
          </div>
          <div class="mini-row">
            <span><span class="lang ${row.langCode}">${escapeHtml(row.lang)}</span> ${escapeHtml(row.group)}</span>
            <span>${escapeHtml(row.status)} · ${row.progress}%</span>
          </div>
          <div class="bar"><i style="width:${row.progress}%"></i></div>
          <div class="mini-row">
            <span class="person-meta">截止：${escapeHtml(row.due || "-")}</span>
            <span class="person-meta">${escapeHtml(row.note || "")}</span>
          </div>
        </div>
      `;
    }

    function clamp(value) {
      return Math.max(0, Math.min(100, Number(value || 0)));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function shortText(value, limit) {
      const text = String(value || "");
      return text.length > limit ? text.slice(0, limit) + "..." : text;
    }

    render();
    loadRemoteRows();
    setInterval(loadRemoteRows, 5000);
    syncGlossaryProgress({ silent: true });
    setInterval(() => {
      if (systemSyncEnabled || location.hostname.endsWith("qixuanzhen.site")) {
        syncGlossaryProgress({ silent: true });
      }
    }, 60000);
  </script>
</body>
</html>
